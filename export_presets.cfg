; Godot 4 Export Presets
; Generated for: Merge Puzzle — iOS distribution
; Signing fields are intentionally blank — injected at build time via Fastlane + match.
; See docs/ios-preflight-checklist.md before your first iOS build.

[preset.0]

name="iOS"
platform="iOS"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/ios/game.xcodeproj"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

; ── Build toolchain ──────────────────────────────────────────────────────────
custom_template/debug=""
custom_template/release=""
variant/export_type=0

; ── Architectures ────────────────────────────────────────────────────────────
; arm64 = all modern iPhones/iPads. x86_64 = simulator only (not for App Store).
architectures/arm64=true
architectures/x86_64=false

; ── App identity (fill in before first build) ────────────────────────────────
; Bundle ID must match APP_IDENTIFIER secret in GitHub Actions and in App Store Connect.
application/bundle_identifier="com.yourcompany.mergepuzzle"
application/short_version="0.1.0"
application/build="1"
application/signature=""
application/name="Merge Puzzle"

; ── Code signing (leave blank — managed by Fastlane match in CI) ─────────────
signing/distribution_style=0
signing/apple_team_id=""
signing/provisioning_profile_uuid_debug=""
signing/certificate_name_debug=""
signing/provisioning_profile_uuid_release=""
signing/certificate_name_release=""

; ── Orientation (portrait-only, matching project.godot viewport 390x844) ─────
orientation/portrait=true
orientation/landscape_left=false
orientation/landscape_right=false
orientation/portrait_upside_down=false

; ── Display ──────────────────────────────────────────────────────────────────
display/screen_scale=2

; ── Capabilities (enable only what the game uses) ────────────────────────────
capabilities/push_notifications=false
capabilities/access_wifi=false
capabilities/in_app_purchases=false
capabilities/game_center=false
capabilities/game_controller=false
capabilities/arkit=false
capabilities/camera=false

; ── User data ────────────────────────────────────────────────────────────────
user_data/accessible_from_files_app=false
user_data/accessible_from_itunes_sharing=false

; ── Privacy usage descriptions (required for App Store review) ───────────────
; Fill in only the permissions your app actually uses. Leave blank otherwise.
privacy/camera_usage_description=""
privacy/microphone_usage_description=""
privacy/photolibrary_usage_description=""
privacy/location_usage_description=""
privacy/address_book_usage_description=""
privacy/calendar_usage_description=""
privacy/reminder_usage_description=""
privacy/health_share_usage_description=""
privacy/health_update_usage_description=""
privacy/apple_music_usage_description=""
privacy/bluetooth_peripheral_usage_description=""
privacy/motion_usage_description=""
privacy/tracking_enabled=false
privacy/tracking_usage_description=""

; ── Icons (add all required sizes before App Store submission) ────────────────
; Run: godot --export-release "iOS" to get a list of missing icons.
; Required sizes: 120, 180 (iPhone), 76, 152, 167 (iPad), 1024 (App Store), 40, 80 (Spotlight).
; Place PNGs in res://icons/ and reference them here, e.g.:
;   icons/iphone_120x120="res://icons/icon_120x120.png"
icons/iphone_120x120=""
icons/iphone_180x180=""
icons/ipad_76x76=""
icons/ipad_152x152=""
icons/ipad_167x167=""
icons/app_store_1024x1024=""
icons/spotlight_40x40=""
icons/spotlight_80x80=""

; ── Launch screen ─────────────────────────────────────────────────────────────
storyboard/use_launch_screen_storyboard=false
storyboard/image_scale_mode=0
storyboard/custom_bg_color=Color(0, 0, 0, 1)
