  <line x1="13.5" y1="34" x2="34.5" y2="34" stroke="#A0785A" stroke-width="0.8"/>
  <line x1="18" y1="22" x2="19" y2="40" stroke="#A0785A" stroke-width="0.6"/>
  <line x1="24" y1="22" x2="24" y2="40" stroke="#A0785A" stroke-width="0.6"/>
