<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Chick - Tier 2 Creatures -->
  <!-- Body -->
  <ellipse cx="24" cy="32" rx="12" ry="10" fill="#FFD700"/>
  <ellipse cx="24" cy="31" rx="11" ry="9" fill="#FFE44D"/>
  <!-- Head -->
  <circle cx="24" cy="18" r="9" fill="#FFD700"/>
  <circle cx="24" cy="17" r="8" fill="#FFE44D"/>
  <!-- Fluffy texture -->
  <circle cx="18" cy="30" r="3" fill="#FFE868" opacity="0.5"/>
  <circle cx="30" cy="30" r="3" fill="#FFE868" opacity="0.5"/>
  <circle cx="20" cy="15" r="2" fill="#FFF080" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="20" cy="16" r="2" fill="#333"/>
  <circle cx="28" cy="16" r="2" fill="#333"/>
  <circle cx="20.5" cy="15.5" r="0.8" fill="#FFF"/>
  <circle cx="28.5" cy="15.5" r="0.8" fill="#FFF"/>
  <!-- Beak -->
  <polygon points="24,19 22,22 26,22" fill="#FF8C00"/>
  <polygon points="24,19 22.5,21 25.5,21" fill="#FFA030"/>
  <!-- Tiny wing nubs -->
  <ellipse cx="12" cy="30" rx="3" ry="5" fill="#FFD700" transform="rotate(-15 12 30)"/>
  <ellipse cx="36" cy="30" rx="3" ry="5" fill="#FFD700" transform="rotate(15 36 30)"/>
  <!-- Feet -->
  <path d="M20 42 L18 46 M20 42 L20 46 M20 42 L22 46" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M28 42 L26 46 M28 42 L28 46 M28 42 L30 46" stroke="#FF8C00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="16" cy="20" rx="2.5" ry="1.5" fill="#FFB0B0" opacity="0.4"/>
  <ellipse cx="32" cy="20" rx="2.5" ry="1.5" fill="#FFB0B0" opacity="0.4"/>
</svg>
