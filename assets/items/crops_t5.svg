<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Golden Harvest - Tier 5 Crops -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="24" cy="24" r="22" fill="url(#glow)"/>
  <!-- Cornucopia horn -->
  <path d="M34 36 Q38 32 40 24 Q40 14 32 10 Q28 8 24 10 Q18 12 16 18 L10 36 Z" fill="#D4A45A" stroke="#8B6914" stroke-width="1"/>
