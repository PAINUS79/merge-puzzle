  <!-- Overflowing golden goods -->
  <circle cx="18" cy="28" r="3" fill="#FFD700"/>
  <circle cx="18" cy="28" r="2" fill="#FFE44D"/>
  <circle cx="24" cy="24" r="3.5" fill="#FFD700"/>
  <circle cx="24" cy="24" r="2.5" fill="#FFE44D"/>
  <circle cx="14" cy="32" r="2.5" fill="#FFD700"/>
  <circle cx="14" cy="32" r="1.8" fill="#FFE44D"/>
  <circle cx="20" cy="22" r="2" fill="#FFA500"/>
  <ellipse cx="22" cy="30" rx="3" ry="2" fill="#7EC876"/>
  <!-- Sparkle effects -->
  <g fill="#FFFFFF" opacity="0.9">
    <polygon points="8,12 9,14 11,14 9.5,15.5 10,18 8,16.5 6,18 6.5,15.5 5,14 7,14"/>
    <polygon points="36,8 37,10 39,10 37.5,11.5 38,14 36,12.5 34,14 34.5,11.5 33,10 35,10" transform="scale(0.7) translate(14 4)"/>
    <polygon points="38,28 39,30 41,30 39.5,31.5 40,34 38,32.5 36,34 36.5,31.5 35,30 37,30" transform="scale(0.6) translate(18 -2)"/>
  </g>
  <!-- Golden highlight -->
  <path d="M28 14 Q30 16 30 20" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>
