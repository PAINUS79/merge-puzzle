<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Plank - Tier 3 Tools -->
  <!-- Plank body -->
  <rect x="6" y="12" width="36" height="24" rx="2" fill="#C4944A" stroke="#8B6914" stroke-width="1"/>
  <!-- Wood grain -->
  <line x1="8" y1="18" x2="40" y2="18" stroke="#A0785A" stroke-width="0.6" opacity="0.6"/>
  <line x1="8" y1="24" x2="40" y2="24" stroke="#A0785A" stroke-width="0.6" opacity="0.6"/>
  <line x1="8" y1="30" x2="40" y2="30" stroke="#A0785A" stroke-width="0.6" opacity="0.6"/>
  <!-- Plank highlight -->
  <rect x="8" y="13" width="32" height="3" rx="1" fill="#D4A45A" opacity="0.4"/>
  <!-- Nail details -->
  <circle cx="10" cy="16" r="1.2" fill="#999" stroke="#777" stroke-width="0.4"/>
  <circle cx="38" cy="16" r="1.2" fill="#999" stroke="#777" stroke-width="0.4"/>
  <circle cx="10" cy="32" r="1.2" fill="#999" stroke="#777" stroke-width="0.4"/>
  <circle cx="38" cy="32" r="1.2" fill="#999" stroke="#777" stroke-width="0.4"/>
  <!-- Knot -->
  <ellipse cx="24" cy="24" rx="3" ry="2" fill="#A0785A" stroke="#8B6914" stroke-width="0.5"/>
  <ellipse cx="24" cy="24" rx="1.5" ry="1" fill="#8B6914" opacity="0.4"/>
</svg>
