<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Fence Post - Tier 4 Tools -->
  <!-- Post body -->
  <rect x="16" y="8" width="16" height="36" rx="2" fill="#A0785A" stroke="#6B4423" stroke-width="1"/>
  <!-- Pointed top -->
  <polygon points="16,10 24,2 32,10" fill="#C4944A" stroke="#6B4423" stroke-width="1"/>
  <!-- Wood grain -->
  <line x1="20" y1="10" x2="20" y2="44" stroke="#8B6914" stroke-width="0.5" opacity="0.4"/>
  <line x1="28" y1="10" x2="28" y2="44" stroke="#8B6914" stroke-width="0.5" opacity="0.4"/>
  <!-- Cross board -->
  <rect x="10" y="22" width="28" height="5" rx="1" fill="#C4944A" stroke="#6B4423" stroke-width="0.8"/>
  <rect x="10" y="34" width="28" height="5" rx="1" fill="#C4944A" stroke="#6B4423" stroke-width="0.8"/>
  <!-- Nails on crossboards -->
  <circle cx="24" cy="24.5" r="1" fill="#999"/>
  <circle cx="24" cy="36.5" r="1" fill="#999"/>
  <!-- Highlight -->
  <rect x="18" y="8" width="3" height="36" rx="1" fill="#D4A45A" opacity="0.3"/>
  <!-- Wood texture on point -->
  <line x1="22" y1="4" x2="22" y2="10" stroke="#8B6914" stroke-width="0.4" opacity="0.4"/>
</svg>
