<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Hen - Tier 3 Creatures -->
  <!-- Tail feathers -->
  <ellipse cx="10" cy="24" rx="5" ry="8" fill="#8B6914" transform="rotate(-20 10 24)"/>
  <ellipse cx="11" cy="22" rx="4" ry="7" fill="#A0785A" transform="rotate(-15 11 22)"/>
  <!-- Body -->
  <ellipse cx="24" cy="30" rx="14" ry="11" fill="#C4944A"/>
  <ellipse cx="24" cy="29" rx="13" ry="10" fill="#D4A45A"/>
  <!-- Wing -->
  <ellipse cx="26" cy="30" rx="8" ry="7" fill="#C4944A" stroke="#A0785A" stroke-width="0.5"/>
  <ellipse cx="26" cy="29" rx="6" ry="5" fill="#D4A45A" opacity="0.6"/>
  <!-- Head -->
  <circle cx="34" cy="16" r="6" fill="#D4A45A"/>
  <circle cx="34" cy="15" r="5.5" fill="#E0B870"/>
  <!-- Comb -->
  <path d="M32 10 Q33 7 34 10 Q35 7 36 10 Q37 7 38 10" fill="#E85050" stroke="#CC3030" stroke-width="0.5"/>
  <!-- Eye -->
  <circle cx="36" cy="14" r="1.5" fill="#333"/>
  <circle cx="36.3" cy="13.7" r="0.5" fill="#FFF"/>
  <!-- Beak -->
  <polygon points="39,16 44,17 39,19" fill="#FF8C00"/>
  <polygon points="39,16.5 42,17 39,18" fill="#FFA030"/>
  <!-- Wattle -->
  <ellipse cx="38" cy="20" rx="2" ry="2.5" fill="#E85050"/>
  <!-- Neck -->
  <path d="M30 22 Q32 18 34 22" fill="#D4A45A"/>
  <!-- Legs -->
  <line x1="20" y1="40" x2="18" y2="46" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="40" x2="30" y2="46" stroke="#FF8C00" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 46 L18 46 L20 46" stroke="#FF8C00" stroke-width="1" stroke-linecap="round"/>
  <path d="M28 46 L30 46 L32 46" stroke="#FF8C00" stroke-width="1" stroke-linecap="round"/>
</svg>
