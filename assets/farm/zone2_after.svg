<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <!-- Zone 2: The Whispering Woods (Restored - Enchanted Forest Glade) -->
  <!-- Warm twilight sky -->
  <rect width="200" height="80" fill="#2A3A50"/>
  <!-- Stars -->
  <circle cx="30" cy="15" r="1" fill="#FFE8AA" opacity="0.7"/>
  <circle cx="90" cy="10" r="0.8" fill="#FFE8AA" opacity="0.6"/>
  <circle cx="160" cy="20" r="1" fill="#FFE8AA" opacity="0.7"/>
  <!-- Ground (mossy) -->
  <rect y="80" width="200" height="70" fill="#4A7A3A"/>
  <ellipse cx="100" cy="80" rx="110" ry="12" fill="#3A6A2A"/>
  <!-- Healthy enchanted trees -->
  <rect x="20" y="30" width="10" height="55" fill="#5A3A1A"/>
  <circle cx="25" cy="22" r="20" fill="#3A8A3A"/>
  <circle cx="18" cy="28" r="14" fill="#4A9A4A"/>
  <rect x="70" y="35" width="10" height="50" fill="#5A3A1A"/>
  <circle cx="75" cy="26" r="22" fill="#3A8A3A"/>
  <circle cx="82" cy="30" r="16" fill="#4A9A4A"/>
  <rect x="130" y="32" width="9" height="53" fill="#5A3A1A"/>
  <circle cx="134" cy="24" r="18" fill="#3A8A3A"/>
  <rect x="165" y="38" width="8" height="47" fill="#5A3A1A"/>
  <circle cx="169" cy="30" r="16" fill="#3A8A3A"/>
  <!-- Mushrooms on ground -->
  <ellipse cx="45" cy="98" rx="4" ry="3" fill="#D4A46A"/>
  <rect x="44" y="98" width="2" height="5" rx="0.5" fill="#E8DCC8"/>
  <ellipse cx="110" cy="95" rx="3" ry="2.5" fill="#66BB6A"/>
  <circle cx="110" cy="94" r="1" fill="#B0FF90" opacity="0.6"/>
  <ellipse cx="160" cy="100" rx="3.5" ry="2.5" fill="#D4A46A"/>
  <!-- Crystal formations -->
  <polygon points="85,92 88,82 91,92" fill="#7090B0"/>
  <polygon points="88,82 91,92 89,88" fill="#90B0D0" opacity="0.6"/>
  <!-- Fireflies -->
  <circle cx="40" cy="55" r="2" fill="#FFE44D" opacity="0.7"/>
  <circle cx="40" cy="55" r="4" fill="#FFE44D" opacity="0.15"/>
  <circle cx="100" cy="50" r="2" fill="#FFE44D" opacity="0.6"/>
  <circle cx="100" cy="50" r="4" fill="#FFE44D" opacity="0.12"/>
  <circle cx="155" cy="48" r="1.5" fill="#FFE44D" opacity="0.7"/>
  <circle cx="155" cy="48" r="3" fill="#FFE44D" opacity="0.15"/>
  <circle cx="75" cy="65" r="1.5" fill="#FFE44D" opacity="0.5"/>
  <circle cx="130" cy="60" r="1.5" fill="#FFE44D" opacity="0.5"/>
  <!-- Lanterns hanging from trees -->
  <rect x="22" y="48" width="6" height="8" rx="2" fill="#FFD060" opacity="0.8"/>
  <rect x="22" y="48" width="6" height="2" rx="1" fill="#D4A030"/>
  <circle cx="25" cy="52" r="2" fill="#FFE880" opacity="0.6"/>
  <rect x="172" y="52" width="5" height="7" rx="1.5" fill="#FFD060" opacity="0.8"/>
  <circle cx="174" cy="55" r="1.5" fill="#FFE880" opacity="0.6"/>
  <!-- Fox peeking -->
  <ellipse cx="150" cy="110" rx="5" ry="3" fill="#D4703A"/>
  <circle cx="147" cy="108" r="3" fill="#D4703A"/>
  <polygon points="144,105 146,100 148,105" fill="#D4703A"/>
  <circle cx="146" cy="107" r="1" fill="#2A1A0A"/>
</svg>
