<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <!-- Zone 2: The Wild Orchard (Restored) -->
  <!-- Sky -->
  <rect width="200" height="80" fill="#87CEEB"/>
  <!-- Sun -->
  <circle cx="170" cy="25" r="15" fill="#FFD700" opacity="0.9"/>
  <!-- Ground (lush) -->
  <rect y="80" width="200" height="70" fill="#7CCD7C"/>
  <ellipse cx="100" cy="80" rx="110" ry="12" fill="#6BBF6B"/>
  <!-- Healthy fruit trees -->
  <rect x="30" y="40" width="8" height="45" fill="#8B5A2B"/>
  <circle cx="34" cy="32" r="18" fill="#4CAF50"/>
  <circle cx="28" cy="36" r="12" fill="#66BB6A"/>
  <!-- Apples on tree -->
  <circle cx="24" cy="28" r="3" fill="#E53935"/>
  <circle cx="40" cy="30" r="3" fill="#E53935"/>
  <circle cx="32" cy="22" r="2.5" fill="#EF5350"/>
  <rect x="90" y="45" width="8" height="40" fill="#8B5A2B"/>
  <circle cx="94" cy="35" r="20" fill="#4CAF50"/>
  <circle cx="100" cy="40" r="14" fill="#66BB6A"/>
  <circle cx="88" cy="30" r="3" fill="#E53935"/>
  <circle cx="100" cy="28" r="3" fill="#E53935"/>
  <circle cx="96" cy="44" r="2.5" fill="#EF5350"/>
  <rect x="150" y="42" width="7" height="43" fill="#8B5A2B"/>
  <circle cx="153" cy="34" r="16" fill="#4CAF50"/>
  <circle cx="148" cy="30" r="2.5" fill="#E53935"/>
  <circle cx="158" cy="28" r="3" fill="#E53935"/>
  <!-- Flower path -->
  <circle cx="20" cy="95" r="2" fill="#FF69B4"/>
  <circle cx="60" cy="100" r="2.5" fill="#FFB347"/>
  <circle cx="100" cy="95" r="2" fill="#FF69B4"/>
  <circle cx="140" cy="100" r="2.5" fill="#FFB347"/>
  <circle cx="180" cy="95" r="2" fill="#FF69B4"/>
  <!-- Beehive (tended) -->
  <rect x="55" y="88" width="12" height="16" rx="2" fill="#D4A45A"/>
  <rect x="54" y="86" width="14" height="4" rx="2" fill="#C4944A"/>
  <circle cx="61" cy="94" r="2" fill="#3A3A1A"/>
  <!-- Bees -->
  <ellipse cx="50" cy="82" rx="2" ry="1" fill="#FFD700"/>
  <ellipse cx="70" cy="78" rx="2" ry="1" fill="#FFD700"/>
  <!-- Basket of fruit -->
  <ellipse cx="160" cy="108" rx="8" ry="5" fill="#A0785A"/>
  <circle cx="157" cy="104" r="3" fill="#E53935"/>
  <circle cx="163" cy="104" r="3" fill="#FF8C00"/>
  <circle cx="160" cy="101" r="2.5" fill="#E53935"/>
</svg>
