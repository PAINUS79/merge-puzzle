  <!-- Dark dense trees -->
  <rect x="20" y="30" width="10" height="55" fill="#2A1A0A"/>
  <circle cx="25" cy="25" r="20" fill="#1A3A1A" opacity="0.9"/>
  <circle cx="18" cy="30" r="14" fill="#142E14" opacity="0.8"/>
  <rect x="70" y="35" width="10" height="50" fill="#2A1A0A"/>
  <circle cx="75" cy="28" r="22" fill="#1A3A1A" opacity="0.9"/>
  <circle cx="82" cy="32" r="16" fill="#142E14" opacity="0.8"/>
  <rect x="130" y="32" width="9" height="53" fill="#2A1A0A"/>
