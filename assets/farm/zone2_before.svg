<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <!-- Zone 2: The Wild Orchard (Before) -->
  <!-- Sky -->
  <rect width="200" height="80" fill="#87CEEB"/>
  <!-- Ground -->
  <rect y="80" width="200" height="70" fill="#6B8E23"/>
  <ellipse cx="100" cy="80" rx="110" ry="12" fill="#556B2F"/>
  <!-- Overgrown trees -->
  <rect x="30" y="40" width="8" height="45" fill="#5C3A1A"/>
  <circle cx="34" cy="35" r="18" fill="#3A5A2A" opacity="0.9"/>
  <circle cx="28" cy="38" r="12" fill="#2E4E24" opacity="0.8"/>
  <rect x="90" y="45" width="8" height="40" fill="#5C3A1A"/>
  <circle cx="94" cy="38" r="20" fill="#3A5A2A" opacity="0.9"/>
  <circle cx="100" cy="42" r="14" fill="#2E4E24" opacity="0.8"/>
  <rect x="150" y="42" width="7" height="43" fill="#5C3A1A"/>
  <circle cx="153" cy="36" r="16" fill="#3A5A2A" opacity="0.9"/>
  <!-- Weeds and thorns -->
  <path d="M10 90 Q20 75 30 90 Q40 78 50 90" stroke="#4A6A2A" stroke-width="2" fill="none"/>
  <path d="M60 95 Q70 80 80 95 Q90 82 100 95" stroke="#4A6A2A" stroke-width="2" fill="none"/>
  <path d="M120 92 Q130 77 140 92 Q150 80 160 92" stroke="#4A6A2A" stroke-width="2" fill="none"/>
  <!-- Fallen fruit (rotting) -->
  <circle cx="50" cy="100" r="3" fill="#8B4513" opacity="0.6"/>
  <circle cx="120" cy="105" r="2.5" fill="#8B4513" opacity="0.6"/>
  <circle cx="170" cy="98" r="3" fill="#8B4513" opacity="0.6"/>
  <!-- Wild beehive -->
  <ellipse cx="40" cy="28" rx="6" ry="8" fill="#C4944A" opacity="0.8"/>
  <ellipse cx="40" cy="28" rx="4" ry="6" fill="#D4A45A" opacity="0.7"/>
</svg>
