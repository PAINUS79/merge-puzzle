<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 400" width="390" height="400">
  <!-- Overcast sky -->
  <rect width="390" height="160" fill="#9CA3A0"/>
  <ellipse cx="80" cy="60" rx="70" ry="30" fill="#8A9190" opacity="0.6"/>
  <ellipse cx="200" cy="40" rx="90" ry="35" fill="#8A9190" opacity="0.5"/>
  <ellipse cx="330" cy="70" rx="60" ry="25" fill="#8A9190" opacity="0.6"/>
  <!-- Pale sun behind clouds -->
  <circle cx="310" cy="50" r="25" fill="#C8C078" opacity="0.3"/>
  <!-- Ground - dried earth -->
  <rect y="160" width="390" height="240" fill="#8B7D6B"/>
  <!-- Dried grass patches -->
  <rect x="0" y="160" width="390" height="20" fill="#7A7258" opacity="0.5"/>
  <!-- Overgrown weeds cluster 1 -->
  <ellipse cx="50" cy="220" rx="30" ry="40" fill="#5C6B3C"/>
  <ellipse cx="40" cy="210" rx="20" ry="30" fill="#6B7B4B" opacity="0.8"/>
  <path d="M30,220 Q35,180 40,190 Q45,170 50,200Z" fill="#4A5A2C" opacity="0.7"/>
  <!-- Overgrown weeds cluster 2 -->
  <ellipse cx="140" cy="230" rx="25" ry="35" fill="#5C6B3C"/>
  <path d="M130,230 Q135,190 145,210 Q150,185 155,220Z" fill="#4A5A2C" opacity="0.6"/>
  <!-- Overgrown weeds cluster 3 -->
  <ellipse cx="220" cy="210" rx="35" ry="45" fill="#5C6B3C"/>
  <ellipse cx="230" cy="200" rx="25" ry="35" fill="#6B7B4B" opacity="0.7"/>
  <!-- Overgrown weeds cluster 4 -->
  <ellipse cx="320" cy="225" rx="28" ry="38" fill="#5C6B3C"/>
  <path d="M310,225 Q315,190 325,200 Q330,180 335,215Z" fill="#4A5A2C" opacity="0.6"/>
  <!-- Dead tree stumps -->
  <rect x="70" y="300" width="16" height="30" rx="3" fill="#5C4033"/>
  <ellipse cx="78" cy="300" rx="12" ry="5" fill="#4A3428"/>
  <rect x="210" y="310" width="14" height="25" rx="3" fill="#5C4033"/>
  <ellipse cx="217" cy="310" rx="10" ry="4" fill="#4A3428"/>
  <rect x="330" y="290" width="18" height="32" rx="3" fill="#5C4033"/>
  <ellipse cx="339" cy="290" rx="13" ry="5" fill="#4A3428"/>
  <!-- Rocks -->
  <ellipse cx="150" cy="340" rx="25" ry="14" fill="#999"/>
  <ellipse cx="148" cy="336" rx="18" ry="8" fill="#AAA" opacity="0.5"/>
  <ellipse cx="340" cy="360" rx="20" ry="12" fill="#888"/>
  <ellipse cx="338" cy="357" rx="14" ry="7" fill="#999" opacity="0.5"/>
  <ellipse cx="50" cy="370" rx="15" ry="9" fill="#8A8A8A"/>
  <!-- Broken fence -->
  <rect x="10" y="370" width="110" height="4" fill="#6B4F3A" transform="rotate(-3 65 372)"/>
  <rect x="30" y="360" width="5" height="18" fill="#6B4F3A"/>
  <rect x="90" y="362" width="5" height="16" fill="#6B4F3A" transform="rotate(10 92 370)"/>
  <!-- Scattered leaves/debris -->
  <circle cx="170" cy="350" r="3" fill="#8B7D3C" opacity="0.5"/>
  <circle cx="260" cy="330" r="2.5" fill="#7B6D2C" opacity="0.5"/>
  <circle cx="300" cy="365" r="3" fill="#8B7D3C" opacity="0.4"/>
  <!-- Label -->
  <text x="195" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666" font-weight="bold">Zone 1 - Overgrown Garden</text>
</svg>
