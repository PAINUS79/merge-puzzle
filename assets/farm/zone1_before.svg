<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 400" width="390" height="400">
  <!-- Sky -->
  <rect width="390" height="160" fill="#B0B0B0"/>
  <!-- Ground -->
  <rect y="160" width="390" height="240" fill="#8B7D6B"/>
  <!-- Overgrown weeds -->
  <rect x="20" y="180" width="60" height="80" rx="4" fill="#6B6B4B" opacity="0.7"/>
  <rect x="100" y="200" width="50" height="60" rx="4" fill="#5C5C3C" opacity="0.7"/>
  <rect x="180" y="170" width="70" height="90" rx="4" fill="#6B6B4B" opacity="0.6"/>
  <rect x="280" y="190" width="55" height="70" rx="4" fill="#5C5C3C" opacity="0.7"/>
  <!-- Dead stumps -->
  <rect x="60" y="300" width="20" height="30" fill="#5C4033"/>
  <rect x="200" y="310" width="18" height="25" fill="#5C4033"/>
  <rect x="310" y="290" width="22" height="35" fill="#5C4033"/>
  <!-- Rocks -->
  <ellipse cx="150" cy="340" rx="25" ry="15" fill="#999"/>
  <ellipse cx="340" cy="360" rx="20" ry="12" fill="#888"/>
  <!-- Label -->
  <text x="195" y="390" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">Zone 1 - Overgrown</text>
</svg>
