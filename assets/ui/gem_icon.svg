<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Gem base -->
  <polygon points="24,4 42,18 34,44 14,44 6,18" fill="#4FC3F7" stroke="#0288D1" stroke-width="1.5"/>
  <!-- Top facet -->
  <polygon points="24,4 18,18 30,18" fill="#81D4FA" opacity="0.7"/>
  <!-- Left facet -->
  <polygon points="6,18 18,18 14,44" fill="#29B6F6" opacity="0.6"/>
  <!-- Right facet -->
  <polygon points="42,18 30,18 34,44" fill="#039BE5" opacity="0.5"/>
  <!-- Bottom facet -->
  <polygon points="18,18 30,18 34,44 14,44" fill="#0288D1" opacity="0.3"/>
  <!-- Center shine -->
  <polygon points="24,10 20,20 28,20" fill="white" opacity="0.35"/>
  <!-- Edge highlight -->
  <line x1="18" y1="18" x2="30" y2="18" stroke="#B3E5FC" stroke-width="0.8" opacity="0.6"/>
  <!-- Sparkle -->
  <circle cx="20" cy="12" r="1.5" fill="white" opacity="0.6"/>
</svg>
