<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Zone 2 Unlock Gate / Arch -->
  <!-- Stone arch left pillar -->
  <rect x="8" y="30" width="22" height="100" rx="4" fill="#9A9090"/>
  <rect x="10" y="32" width="9" height="98" rx="2" fill="#ADA8A8" opacity="0.4"/>
  <!-- Stone block texture on left pillar -->
  <rect x="8" y="50" width="22" height="2" fill="#888080" opacity="0.5"/>
  <rect x="8" y="68" width="22" height="2" fill="#888080" opacity="0.5"/>
  <rect x="8" y="86" width="22" height="2" fill="#888080" opacity="0.5"/>
  <rect x="8" y="104" width="22" height="2" fill="#888080" opacity="0.5"/>
  <!-- Stone arch right pillar -->
  <rect x="90" y="30" width="22" height="100" rx="4" fill="#9A9090"/>
  <rect x="92" y="32" width="9" height="98" rx="2" fill="#ADA8A8" opacity="0.4"/>
  <!-- Stone block texture on right pillar -->
  <rect x="90" y="50" width="22" height="2" fill="#888080" opacity="0.5"/>
  <rect x="90" y="68" width="22" height="2" fill="#888080" opacity="0.5"/>
  <rect x="90" y="86" width="22" height="2" fill="#888080" opacity="0.5"/>
  <rect x="90" y="104" width="22" height="2" fill="#888080" opacity="0.5"/>
  <!-- Arch curve -->
  <path d="M8 50 Q8 10 60 10 Q112 10 112 50" fill="#9A9090" stroke="#888080" stroke-width="2"/>
  <path d="M16 50 Q16 18 60 18 Q104 18 104 50" fill="#B0AAAA" opacity="0.35"/>
  <!-- Arch keystone -->
  <polygon points="55,8 60,3 65,8 63,14 57,14" fill="#C4944A" stroke="#8B6914" stroke-width="1"/>
  <!-- Apple decorations on pillars -->
  <circle cx="19" cy="40" r="6" fill="#E8201A"/>
  <circle cx="19" cy="40" r="3.5" fill="#F04030" opacity="0.6"/>
  <path d="M19 34 Q19.5 32 20 31" stroke="#5AB85A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="101" cy="40" r="6" fill="#E8201A"/>
  <circle cx="101" cy="40" r="3.5" fill="#F04030" opacity="0.6"/>
  <path d="M101 34 Q101.5 32 102 31" stroke="#5AB85A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Gate doors (locked state) -->
  <rect x="30" y="50" width="26" height="70" rx="3" fill="#8B6914"/>
  <rect x="32" y="52" width="10" height="66" rx="2" fill="#A07838" opacity="0.4"/>
  <!-- Door planks -->
  <rect x="30" y="68" width="26" height="2" fill="#6B4A10" opacity="0.6"/>
  <rect x="30" y="84" width="26" height="2" fill="#6B4A10" opacity="0.6"/>
  <rect x="30" y="100" width="26" height="2" fill="#6B4A10" opacity="0.6"/>
  <!-- Right door -->
  <rect x="64" y="50" width="26" height="70" rx="3" fill="#8B6914"/>
  <rect x="74" y="52" width="10" height="66" rx="2" fill="#A07838" opacity="0.4"/>
  <rect x="64" y="68" width="26" height="2" fill="#6B4A10" opacity="0.6"/>
  <rect x="64" y="84" width="26" height="2" fill="#6B4A10" opacity="0.6"/>
  <rect x="64" y="100" width="26" height="2" fill="#6B4A10" opacity="0.6"/>
  <!-- Lock in center -->
  <rect x="51" y="80" width="18" height="14" rx="3" fill="#C4944A" stroke="#8B6914" stroke-width="1"/>
  <path d="M55 80 Q55 73 60 73 Q65 73 65 80" fill="none" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="60" cy="87" r="3" fill="#8B6914"/>
  <rect x="59" y="87" width="2" height="4" rx="1" fill="#8B6914"/>
  <!-- Ivy/vines on pillars -->
  <path d="M8 80 Q5 75 8 70 Q11 75 8 80" fill="#5AB85A" opacity="0.65"/>
  <path d="M8 95 Q5 90 8 85 Q11 90 8 95" fill="#6AC86A" opacity="0.6"/>
  <path d="M112 75 Q115 70 112 65 Q109 70 112 75" fill="#5AB85A" opacity="0.65"/>
  <path d="M112 92 Q115 87 112 82 Q109 87 112 92" fill="#6AC86A" opacity="0.6"/>
  <!-- "Zone 2" text sign on arch -->
  <rect x="36" y="17" width="48" height="16" rx="4" fill="#D4A45A" stroke="#8B6914" stroke-width="1"/>
  <text x="60" y="29" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5C3A0A" font-weight="bold">ZONE 2</text>
  <!-- Stars/lock icon hint on gate -->
  <text x="60" y="108" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C4944A">✦</text>
</svg>
