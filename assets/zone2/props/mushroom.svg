  <path d="M14 24 Q17 28 21 28" stroke="#C8A880" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M36 24 Q34 27 30 27" stroke="#C8A880" stroke-width="0.8" fill="none" opacity="0.6"/>
