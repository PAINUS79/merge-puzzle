<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 400" width="390" height="400">
  <!-- Warm afternoon sky -->
  <rect width="390" height="160" fill="#F0C87A"/>
  <!-- Gradient sky overlay -->
  <rect width="390" height="80" fill="#87CEEB" opacity="0.5"/>
  <!-- Soft clouds -->
  <ellipse cx="70" cy="45" rx="48" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="50" cy="40" rx="28" ry="12" fill="white" opacity="0.5"/>
  <ellipse cx="290" cy="55" rx="42" ry="16" fill="white" opacity="0.55"/>
  <ellipse cx="320" cy="50" rx="24" ry="10" fill="white" opacity="0.5"/>
  <!-- Warm harvest sun -->
  <circle cx="340" cy="42" r="30" fill="#FFB347"/>
  <circle cx="340" cy="42" r="23" fill="#FFD070" opacity="0.6"/>
  <!-- Ground - orchard grass -->
  <rect y="160" width="390" height="240" fill="#6BBE6B"/>
