  <path d="M170 400 Q185 300 190 200 Q193 170 195 160" stroke="#C4A97D" stroke-width="36" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- Path detail -->
  <path d="M172 400 Q186 305 191 202" stroke="#D4B98D" stroke-width="16" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Left apple tree -->
  <rect x="50" y="280" width="16" height="65" rx="4" fill="#8B6914"/>
  <rect x="53" y="280" width="6" height="65" rx="2" fill="#A0785A" opacity="0.5"/>
  <circle cx="58" cy="265" r="38" fill="#2E8B22"/>
  <circle cx="44" cy="255" r="26" fill="#3A9B2E" opacity="0.7"/>
  <circle cx="70" cy="258" r="22" fill="#348B28" opacity="0.6"/>
  <!-- Apples on left tree -->
  <circle cx="50" cy="258" r="5" fill="#E8201A"/>
  <circle cx="50" cy="258" r="3" fill="#F04030" opacity="0.7"/>
  <circle cx="65" cy="268" r="5" fill="#CC1A10"/>
  <circle cx="65" cy="268" r="3" fill="#E02820" opacity="0.7"/>
  <circle cx="55" cy="245" r="4.5" fill="#E8201A"/>
  <circle cx="72" cy="252" r="4" fill="#D01A10"/>
  <circle cx="42" cy="265" r="4" fill="#E8201A"/>
  <circle cx="60" cy="278" r="3.5" fill="#CC1A10"/>
  <!-- Right apple tree -->
  <rect x="300" y="285" width="16" height="60" rx="4" fill="#8B6914"/>
  <rect x="303" y="285" width="6" height="60" rx="2" fill="#A0785A" opacity="0.5"/>
  <circle cx="308" cy="268" r="36" fill="#228B22"/>
  <circle cx="294" cy="260" r="24" fill="#2E9B2A" opacity="0.7"/>
  <circle cx="320" cy="262" r="20" fill="#289022" opacity="0.6"/>
  <!-- Apples on right tree -->
  <circle cx="298" cy="262" r="5" fill="#E8201A"/>
  <circle cx="298" cy="262" r="3" fill="#F04030" opacity="0.7"/>
  <circle cx="316" cy="270" r="5" fill="#CC1A10"/>
  <circle cx="316" cy="270" r="3" fill="#E02820" opacity="0.7"/>
  <circle cx="305" cy="252" r="4.5" fill="#E8201A"/>
  <circle cx="320" cy="257" r="4" fill="#D01A10"/>
  <circle cx="292" cy="270" r="4" fill="#E8201A"/>
  <circle cx="310" cy="280" r="3.5" fill="#CC1A10"/>
  <!-- Background trees (smaller, less detail) -->
  <rect x="130" y="310" width="10" height="45" rx="3" fill="#8B6914" opacity="0.7"/>
  <circle cx="135" cy="298" r="22" fill="#228B22" opacity="0.65"/>
  <rect x="235" y="315" width="10" height="40" rx="3" fill="#8B6914" opacity="0.7"/>
  <circle cx="240" cy="302" r="20" fill="#2E8B22" opacity="0.65"/>
