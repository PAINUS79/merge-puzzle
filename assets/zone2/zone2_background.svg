  <circle cx="40" cy="352" r="4" fill="#E8201A"/>
  <circle cx="40" cy="352" r="2.5" fill="#F04030" opacity="0.7"/>
  <circle cx="75" cy="360" r="3.5" fill="#CC1A10"/>
  <circle cx="318" cy="355" r="4" fill="#E8201A"/>
  <circle cx="297" cy="368" r="3.5" fill="#CC1A10"/>
