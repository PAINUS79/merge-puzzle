  <rect x="10" y="358" width="135" height="5" rx="2" fill="#A0522D"/>
  <rect x="225" y="358" width="155" height="5" rx="2" fill="#A0522D"/>
  <rect x="25" y="346" width="6" height="22" rx="1" fill="#A0522D"/>
  <rect x="80" y="346" width="6" height="22" rx="1" fill="#A0522D"/>
  <rect x="135" y="346" width="6" height="22" rx="1" fill="#A0522D"/>
  <rect x="240" y="346" width="6" height="22" rx="1" fill="#A0522D"/>
  <rect x="295" y="346" width="6" height="22" rx="1" fill="#A0522D"/>
  <rect x="350" y="346" width="6" height="22" rx="1" fill="#A0522D"/>
  <!-- Butterflies -->
  <ellipse cx="158" cy="190" rx="7" ry="4" fill="#FFD070" opacity="0.75" transform="rotate(-20 158 190)"/>
  <ellipse cx="167" cy="190" rx="7" ry="4" fill="#FFD070" opacity="0.75" transform="rotate(20 167 190)"/>
  <circle cx="163" cy="191" r="1.2" fill="#8B4">
  </circle>
  <!-- Label -->
  <text x="195" y="395" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#3A5E1A" font-weight="bold">Zone 2 - Orchard Grove</text>
</svg>
