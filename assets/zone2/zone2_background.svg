  <path d="M149 308 Q158 306 167 308" stroke="#C4944A" stroke-width="0.8" fill="none"/>
  <path d="M150 303 Q158 301 166 303" stroke="#C4944A" stroke-width="0.8" fill="none"/>
  <!-- Harvest basket near right tree -->
  <ellipse cx="340" cy="362" rx="18" ry="7" fill="#A0785A"/>
  <path d="M322 362 Q322 345 340 343 Q358 345 358 362Z" fill="#8B6035"/>
  <ellipse cx="340" cy="343" rx="18" ry="5" fill="#C4944A"/>
  <!-- Apples in basket -->
  <circle cx="333" cy="348" r="4" fill="#E8201A"/>
  <circle cx="344" cy="346" r="4.5" fill="#CC1A10"/>
  <circle cx="337" cy="342" r="3.5" fill="#E8201A"/>
