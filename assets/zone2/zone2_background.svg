  <rect x="155" y="310" width="6" height="40" rx="1" fill="#8B6914"/>
  <ellipse cx="158" cy="310" rx="10" ry="4" fill="#D4A45A"/>
  <ellipse cx="158" cy="305" rx="9" ry="7" fill="#E8C87A"/>
  <ellipse cx="158" cy="299" rx="8" ry="6" fill="#D4B460"/>
  <ellipse cx="158" cy="294" rx="6" ry="4" fill="#C4A450"/>
