<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Bee - Tier 1 Honey -->
  <!-- Wings -->
  <ellipse cx="16" cy="18" rx="10" ry="6" fill="#C8E8FF" opacity="0.75" transform="rotate(-20 16 18)"/>
  <ellipse cx="32" cy="18" rx="10" ry="6" fill="#C8E8FF" opacity="0.75" transform="rotate(20 32 18)"/>
  <!-- Wing detail lines -->
  <path d="M10 16 Q16 18 22 16" stroke="#90C8E8" stroke-width="0.7" fill="none" opacity="0.6"/>
  <path d="M26 16 Q32 18 38 16" stroke="#90C8E8" stroke-width="0.7" fill="none" opacity="0.6"/>
  <!-- Bee body -->
  <ellipse cx="24" cy="26" rx="9" ry="12" fill="#FFD700"/>
  <!-- Stripes -->
  <rect x="15" y="23" width="18" height="3.5" rx="1.5" fill="#3A3A1A" opacity="0.85"/>
  <rect x="15" y="28.5" width="18" height="3" rx="1.5" fill="#3A3A1A" opacity="0.85"/>
  <!-- Body highlight -->
  <ellipse cx="20" cy="22" rx="3" ry="4" fill="#FFE84D" opacity="0.4"/>
  <!-- Head -->
  <circle cx="24" cy="16" r="6" fill="#FFD700"/>
  <circle cx="24" cy="16" r="4" fill="#FFE060" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="21" cy="15" r="1.5" fill="#1A1A0A"/>
  <circle cx="27" cy="15" r="1.5" fill="#1A1A0A"/>
  <circle cx="21.5" cy="14.5" r="0.5" fill="white"/>
  <circle cx="27.5" cy="14.5" r="0.5" fill="white"/>
  <!-- Antennae -->
  <path d="M22 11 Q20 7 17 5" stroke="#8B6914" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M26 11 Q28 7 31 5" stroke="#8B6914" stroke-width="1" fill="none" stroke-linecap="round"/>
  <circle cx="17" cy="5" r="1.5" fill="#FFD700"/>
  <circle cx="31" cy="5" r="1.5" fill="#FFD700"/>
  <!-- Stinger -->
  <path d="M24 37 Q24 40 24 43" stroke="#8B6914" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
