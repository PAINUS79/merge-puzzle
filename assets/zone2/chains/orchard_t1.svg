<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Apple Pip - Tier 1 Orchard -->
  <!-- Soil mound -->
  <ellipse cx="24" cy="40" rx="13" ry="4" fill="#8B6914"/>
  <ellipse cx="24" cy="39" rx="11" ry="3" fill="#A0785A"/>
  <!-- Apple seed -->
  <ellipse cx="24" cy="30" rx="5" ry="7" fill="#5C3A1A" transform="rotate(5 24 30)"/>
  <ellipse cx="24" cy="30" rx="3.5" ry="5.5" fill="#7A5030" transform="rotate(5 24 30)"/>
  <!-- Seed center line -->
  <path d="M24 24 Q23.5 30 24 36" stroke="#4A2A10" stroke-width="0.8" fill="none"/>
  <!-- Tiny sprout emerging -->
  <path d="M24 25 Q22 20 20 17" stroke="#7EC876" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="19.5" cy="16" rx="3" ry="2" fill="#7EC876" transform="rotate(-25 19.5 16)"/>
  <!-- Highlight on seed -->
  <ellipse cx="22" cy="27" rx="1.5" ry="2.5" fill="#A07850" opacity="0.4" transform="rotate(5 22 27)"/>
