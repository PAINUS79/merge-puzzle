<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Blossoming Tree - Tier 3 Orchard -->
  <!-- Ground -->
  <ellipse cx="24" cy="45" rx="14" ry="3.5" fill="#8B6914"/>
  <ellipse cx="24" cy="44" rx="12" ry="2.5" fill="#A0785A"/>
  <!-- Trunk -->
  <rect x="21" y="28" width="6" height="18" rx="3" fill="#8B6914"/>
  <rect x="22.5" y="28" width="2.5" height="18" rx="1" fill="#A0785A" opacity="0.4"/>
  <!-- Branches -->
  <path d="M24 32 Q16 25 10 20" stroke="#8B6914" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M24 30 Q32 23 38 18" stroke="#8B6914" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M24 28 Q22 18 22 12" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Canopy -->
  <circle cx="24" cy="18" r="16" fill="#2E8B22"/>
  <circle cx="14" cy="20" r="10" fill="#3A9B2A" opacity="0.7"/>
  <circle cx="34" cy="20" r="9" fill="#348B20" opacity="0.65"/>
  <circle cx="24" cy="12" r="10" fill="#3A9B2A" opacity="0.6"/>
  <!-- Blossoms on canopy -->
  <circle cx="16" cy="14" r="2.5" fill="#FFB6C1"/>
  <circle cx="16" cy="14" r="1.2" fill="#FFD4DD" opacity="0.8"/>
  <circle cx="28" cy="11" r="2.5" fill="#FFB6C1"/>
  <circle cx="28" cy="11" r="1.2" fill="#FFD4DD" opacity="0.8"/>
  <circle cx="35" cy="16" r="2" fill="#FFC0CB"/>
  <circle cx="35" cy="16" r="1" fill="#FFD4DD" opacity="0.8"/>
  <circle cx="12" cy="22" r="2" fill="#FFB6C1"/>
  <circle cx="12" cy="22" r="1" fill="#FFD4DD" opacity="0.8"/>
  <circle cx="22" cy="24" r="2" fill="#FFC0CB"/>
  <circle cx="22" cy="24" r="1" fill="#FFD4DD" opacity="0.8"/>
  <!-- One small apple forming -->
  <circle cx="33" cy="22" r="3" fill="#E8201A"/>
  <circle cx="33" cy="22" r="1.8" fill="#F04030" opacity="0.6"/>
  <path d="M33 19 Q33.5 17 34 16" stroke="#5AB85A" stroke-width="1" fill="none" stroke-linecap="round"/>
