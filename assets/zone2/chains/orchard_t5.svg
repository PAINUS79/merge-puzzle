<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Grand Harvest Tree - Tier 5 Orchard -->
  <defs>
    <radialGradient id="orchard_glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFACD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Golden aura -->
  <circle cx="24" cy="18" r="22" fill="url(#orchard_glow)"/>
  <!-- Ground -->
  <ellipse cx="24" cy="46" rx="16" ry="3" fill="#8B6914"/>
  <ellipse cx="24" cy="45" rx="14" ry="2.2" fill="#A0785A"/>
  <!-- Trunk - thick, gnarled -->
  <path d="M20 46 Q18 38 19 30 Q20 24 24 24 Q28 24 29 30 Q30 38 28 46Z" fill="#8B6914"/>
  <path d="M22 46 Q21 38 21.5 30 Q22 26 24 26 Q26 26 26.5 30 Q27 38 26 46Z" fill="#A0785A" opacity="0.4"/>
  <!-- Main branches -->
  <path d="M21 34 Q11 26 5 18" stroke="#8B6914" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M27 33 Q37 25 43 18" stroke="#8B6914" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M24 28 Q20 18 20 10" stroke="#8B6914" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M24 28 Q28 18 28 10" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rich canopy -->
  <circle cx="24" cy="16" r="19" fill="#1A7A18"/>
  <circle cx="11" cy="19" r="13" fill="#228B22" opacity="0.75"/>
  <circle cx="37" cy="19" r="12" fill="#208020" opacity="0.7"/>
  <circle cx="24" cy="8" r="13" fill="#228B22" opacity="0.7"/>
  <circle cx="16" cy="12" r="9" fill="#2A9A28" opacity="0.55"/>
  <circle cx="32" cy="12" r="9" fill="#2A9A28" opacity="0.55"/>
  <!-- Golden apples - abundant harvest -->
  <circle cx="12" cy="15" r="4" fill="#FFD700"/>
  <circle cx="12" cy="15" r="2.5" fill="#FFE84D" opacity="0.7"/>
  <circle cx="24" cy="9" r="4" fill="#FFD700"/>
  <circle cx="24" cy="9" r="2.5" fill="#FFE84D" opacity="0.7"/>
  <circle cx="36" cy="15" r="4" fill="#FFD700"/>
  <circle cx="36" cy="15" r="2.5" fill="#FFE84D" opacity="0.7"/>
  <!-- Red apples mixed in -->
  <circle cx="8" cy="22" r="3.5" fill="#E8201A"/>
  <circle cx="8" cy="22" r="2" fill="#F04030" opacity="0.6"/>
  <circle cx="19" cy="22" r="3.5" fill="#E8201A"/>
  <circle cx="19" cy="22" r="2" fill="#F04030" opacity="0.6"/>
  <circle cx="29" cy="21" r="3.5" fill="#E8201A"/>
  <circle cx="29" cy="21" r="2" fill="#F04030" opacity="0.6"/>
  <circle cx="39" cy="22" r="3" fill="#E8201A"/>
  <circle cx="39" cy="22" r="1.8" fill="#F04030" opacity="0.6"/>
  <circle cx="15" cy="26" r="3" fill="#FFD700"/>
  <circle cx="15" cy="26" r="1.8" fill="#FFE84D" opacity="0.7"/>
  <circle cx="33" cy="26" r="3" fill="#E8201A"/>
  <!-- Apple stems (golden) -->
  <path d="M12 12 Q12.5 10 13 9" stroke="#6ACA68" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M24 6 Q24.5 4 25 3" stroke="#6ACA68" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M36 12 Q36.5 10 37 9" stroke="#6ACA68" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Sparkle effects -->
  <g fill="#FFFFFF" opacity="0.9">
    <polygon points="5,6 6,8 8,8 6.5,9.5 7,12 5,10.5 3,12 3.5,9.5 2,8 4,8"/>
    <polygon points="42,5 43,7 45,7 43.5,8.5 44,11 42,9.5 40,11 40.5,8.5 39,7 41,7" transform="scale(0.75) translate(14,2)"/>
  </g>
  <!-- Golden shimmer on canopy -->
  <path d="M18 10 Q20 12 20 16" stroke="#FFD700" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>
