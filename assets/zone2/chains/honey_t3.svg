<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Honeycomb Cluster - Tier 3 Honey -->
  <!-- Background comb rows -->
  <!-- Row 1: 3 hexes -->
  <polygon points="12,8 16,6 20,8 20,12 16,14 12,12" fill="#C4944A" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="20,8 24,6 28,8 28,12 24,14 20,12" fill="#D4A45A" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="28,8 32,6 36,8 36,12 32,14 28,12" fill="#C4944A" stroke="#8B6914" stroke-width="0.7"/>
  <!-- Row 2: 4 hexes (offset) -->
  <polygon points="8,14 12,12 16,14 16,18 12,20 8,18" fill="#D4B460" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="16,14 20,12 24,14 24,18 20,20 16,18" fill="#E8C870" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="24,14 28,12 32,14 32,18 28,20 24,18" fill="#D4A45A" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="32,14 36,12 40,14 40,18 36,20 32,18" fill="#D4B460" stroke="#8B6914" stroke-width="0.7"/>
  <!-- Row 3: 3 hexes -->
  <polygon points="12,20 16,18 20,20 20,24 16,26 12,24" fill="#C4944A" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="20,20 24,18 28,20 28,24 24,26 20,24" fill="#D4A45A" stroke="#8B6914" stroke-width="0.7"/>
  <polygon points="28,20 32,18 36,20 36,24 32,26 28,24" fill="#C4944A" stroke="#8B6914" stroke-width="0.7"/>
  <!-- Honey filling bright centers -->
  <ellipse cx="16" cy="10" rx="1.8" ry="1.4" fill="#FFD060" opacity="0.8"/>
  <ellipse cx="24" cy="10" rx="1.8" ry="1.4" fill="#FFE080" opacity="0.8"/>
  <ellipse cx="20" cy="16" rx="1.8" ry="1.4" fill="#FFD060" opacity="0.8"/>
  <ellipse cx="28" cy="16" rx="1.8" ry="1.4" fill="#FFDF70" opacity="0.8"/>
  <ellipse cx="24" cy="22" rx="1.8" ry="1.4" fill="#FFD060" opacity="0.8"/>
  <!-- Three bees swarming -->
  <ellipse cx="8" cy="30" rx="3" ry="5" fill="#FFD700"/>
  <rect x="5.2" y="29" width="5.5" height="1.8" rx="0.9" fill="#3A3A1A" opacity="0.8"/>
  <ellipse cx="6.5" cy="26.5" rx="3.5" ry="2" fill="#C8E8FF" opacity="0.65" transform="rotate(-25 6.5 26.5)"/>
  <ellipse cx="40" cy="10" rx="3" ry="5" fill="#FFD700"/>
  <rect x="37.2" y="9" width="5.5" height="1.8" rx="0.9" fill="#3A3A1A" opacity="0.8"/>
  <ellipse cx="38.5" cy="6.5" rx="3.5" ry="2" fill="#C8E8FF" opacity="0.65" transform="rotate(25 38.5 6.5)"/>
  <!-- Big honey drip -->
  <path d="M24 26 Q24 33 24 37" stroke="#D4A020" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="24" cy="39" rx="3.5" ry="4" fill="#E8B420"/>
  <ellipse cx="23" cy="38" rx="1.2" ry="1.8" fill="#F0C840" opacity="0.5"/>
</svg>
